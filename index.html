<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>My Music Player</h1>
    <select id="songSelect">
      <option value="https://github.com/ItsGamingGo/Resources-for-Music-Web/raw/main/Dave-Heart-Attack-(TrendyBeatz.com).mp3">Heart Attack Dave
      </option>
      <option value="https://github.com/ItsGamingGo/Resources-for-Music-Web/raw/main/Feet%20Don't%20Fail%20Me%20Now_Joy%20Crookes.mp3">Feet Don't Fail me Now
      </option>
      <option value="https://github.com/ItsGamingGo/Resources-for-Music-Web/raw/main/Lighter%20(feat.%20KSI)_Nathan%20Dawe.mp3">Lighter KSI
      </option>
      <option value="https://github.com/ItsGamingGo/Resources-for-Music-Web/raw/main/As%20the%20World%20Caves%20In_Amanda%20Nicole.mp3">As The World Caves In
      </option>
      <option value="https://github.com/ItsGamingGo/Resources-for-Music-Web/raw/main/Blinding%20Lights%20(8D%20Audio)_8D%20Tunes.m4a">Blinding Lights 8D
      </option>
      <option value="https://github.com/ItsGamingGo/Resources-for-Music-Web/raw/main/Glitch%20In%20The%20Simulation%20(with%20salem%20ilese)_Gryffin.mp3">Glitch In the Simulation Salem Ilese
      </option>
    </select>
    <button id="addToPlaylistBtn">Add to Playlist</button>
    <audio id="audio" controls>
      <source id="audioSource" src="" type="audio/mp3">
      Your browser does not support the audio element.
    </audio>
    <div id="progressBar">
      <div id="progress"></div>
    </div>
    <div class="controls">
      <button id="previousBtn">&lt; Previous</button>
      <button id="playPauseBtn">Play</button>
      <button id="nextBtn">Next &gt;</button>
      <button id="stopBtn">Stop</button>
    </div>
    <div id="queueDisplay">
      <h2>Queue</h2>
      <ul id="queueList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
